services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    #ports:
    #  - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /docker-deployments/:/docker-deployments/
    labels:
      caddy: dockhand.$DOMAIN
      caddy.import_0: allowlist
      caddy.import_1: security-headers
      caddy.reverse_proxy: "{{ upstreams 3000 }}"

      homepage.group: $DOMAIN Monitoring
      homepage.name: Dockhand
      homepage.icon: dockhand.png
    networks:
      dockhand:

networks:
  dockhand:
    name: dockhand
