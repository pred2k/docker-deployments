---
services:
  caddy:
    #image: caddy:latest
    build: .
    container_name: caddy
    restart: on-failure:5
    pids_limit: 50
    mem_limit: 128mb
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data:rw
      - ./caddy_config:/config:rw
      - /var/run/docker.sock:/var/run/docker.sock  # for plugin caddy-docker-proxy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp  # for HTTP/3
    env_file: .env
    environment:
      # following env vars are defined in /etc/environment
      - DOMAIN
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
    labels:
      comcenturylinklabs.watchtower.monitor-only: true

      # tinyauth config. https://tinyauth.app/docs/community/caddy/
      caddy: (tinyauth_forwarder)
      caddy.forward_auth: tinyauth:3000
      caddy.forward_auth.uri: /api/auth/caddy
    networks:
      - adguardhome
      - redlib
      - whoogle
      - karakeep
      - gotify
      - navidrome
      - pocket-id
      - qui
      - feishin
      - caddy

networks:
  adguardhome:
    external: true
  redlib:
    external: true
  whoogle:
    external: true
  karakeep:
    external: true
  gotify:
    external: true
  navidrome:
    external: true
  pocket-id:
    external: true
  qui:
    external: true
  feishin:
    external: true
  caddy:
    name: caddy
    driver: bridge
